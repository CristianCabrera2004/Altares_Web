<!-- src/app/pages/dashboard/dashboard.component.html -->
<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">
        Bienvenido, <strong>{{ nombre() }}</strong> — {{ horaActual() }}
      </p>
    </div>
    @if (isAdmin()) {
      <span class="role-badge admin">Administrador</span>
    } @else {
      <span class="role-badge operator">Operador</span>
    }
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </div>
      <div class="kpi-info">
        <span class="kpi-label">Productos</span>
        <span class="kpi-value">—</span>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <div class="kpi-info">
        <span class="kpi-label">Ventas Hoy</span>
        <span class="kpi-value">—</span>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon orange">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="kpi-info">
        <span class="kpi-label">Stock Bajo</span>
        <span class="kpi-value">—</span>
      </div>
    </div>
    @if (isAdmin()) {
      <div class="kpi-card">
        <div class="kpi-icon purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <div class="kpi-info">
          <span class="kpi-label">Usuarios</span>
          <span class="kpi-value">—</span>
        </div>
      </div>
    }
  </div>

  <div class="empty-state">
    <svg viewBox="0 0 64 64" fill="none" width="56">
      <circle cx="32" cy="32" r="30" stroke="#2d3148" stroke-width="2"/>
      <path d="M20 32h24M32 20v24" stroke="#4F8EF7" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <p>Los datos del dashboard se cargarán al conectar la base de datos.</p>
  </div>
</div>
